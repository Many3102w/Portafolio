<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Decorar el piso en AR · Christopher Gómez</title>
  <meta name="description" content="Experiencia de realidad aumentada (WebXR): detecta el piso y deja caer figuras decorativas al suelo." />
  <style>
    :root { --accent:#2f81ff; --accent-2:#54b9ff; --bg:#000; --text:#fff; --muted:#9aa3b2; }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; background: var(--bg); color: var(--text);
      font-family: -apple-system, system-ui, "Segoe UI", Roboto, Inter, sans-serif; }
    a { color: var(--accent-2); }

    /* Pantalla de inicio / mensajes (cuando NO estamos dentro de AR) */
    .intro { min-height: 100%; display: grid; place-items: center; padding: 28px; text-align: center; }
    .intro__card { max-width: 440px; }
    .intro h1 { font-size: 1.5rem; margin: 0 0 8px; }
    .intro p { color: var(--muted); line-height: 1.6; margin: 10px 0; }
    .btn { display: inline-block; margin-top: 14px; padding: 14px 26px; border: 0; border-radius: 999px;
      font-size: 1rem; font-weight: 700; cursor: pointer; text-decoration: none;
      background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: #fff;
      box-shadow: 0 16px 40px -14px rgba(47,129,255,.7); }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .btn--ghost { background: #181c25; box-shadow: none; }
    .hidden { display: none !important; }

    /* Capa de controles que se superpone a la cámara dentro de AR (dom-overlay) */
    #overlay { position: fixed; inset: 0; pointer-events: none; }
    #overlay .topbar { position: absolute; top: 0; left: 0; right: 0; display: flex; justify-content: space-between;
      align-items: center; gap: 10px; padding: 14px 16px; }
    #overlay .pill { pointer-events: auto; background: rgba(16,19,25,.72); backdrop-filter: blur(6px);
      border: 0; color: #fff; padding: 10px 16px; border-radius: 999px; font-weight: 600; font-size: .92rem; }
    #overlay .hint { position: absolute; left: 50%; bottom: 28px; transform: translateX(-50%);
      background: rgba(16,19,25,.72); backdrop-filter: blur(6px); padding: 10px 18px; border-radius: 999px;
      font-size: .9rem; max-width: 90vw; text-align: center; }
  </style>
</head>
<body>

  <!-- Pantalla previa / fallback (se oculta al entrar a AR) -->
  <div class="intro" id="intro">
    <div class="intro__card">
      <h1>🪄 Decorar el piso en AR</h1>
      <p id="introText">Apunta la cámara al <strong>suelo</strong>, espera a que aparezca el círculo y
        <strong>toca la pantalla</strong> para dejar caer figuras. Decora todo lo que quieras y camina alrededor.</p>
      <button class="btn" id="startBtn" disabled>Comprobando dispositivo…</button>
      <p><a href="index.html#diseno3d">← Volver al portafolio</a></p>
      <p id="note" class="hidden"></p>
    </div>
  </div>

  <!-- Controles superpuestos dentro de la sesión AR -->
  <div id="overlay" class="hidden">
    <div class="topbar">
      <span class="pill" id="counter">Figuras: 0</span>
      <button class="pill" id="clearBtn">🧹 Limpiar</button>
    </div>
    <div class="hint" id="arHint">Mueve el teléfono para escanear el piso…</div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';

    const introEl  = document.getElementById('intro');
    const startBtn = document.getElementById('startBtn');
    const noteEl   = document.getElementById('note');
    const overlay  = document.getElementById('overlay');
    const counterEl= document.getElementById('counter');
    const clearBtn = document.getElementById('clearBtn');
    const arHint   = document.getElementById('arHint');

    // ── Comprobación de soporte ──────────────────────────────────────
    async function checkSupport() {
      if (!('xr' in navigator)) return fail(
        'Tu navegador no soporta WebXR. En Android usa <strong>Google Chrome</strong>. ' +
        'En iPhone, usa el botón “Colocar en el piso (AR)” del portafolio.');
      let ok = false;
      try { ok = await navigator.xr.isSessionSupported('immersive-ar'); } catch (_) {}
      if (!ok) return fail(
        'Este dispositivo no soporta AR por WebXR (requiere Android con ARCore y Chrome). ' +
        'En iPhone, usa el botón “Colocar en el piso (AR)” del portafolio.');
      startBtn.disabled = false;
      startBtn.textContent = '▶ Iniciar AR';
    }
    function fail(msg) {
      startBtn.classList.add('hidden');
      noteEl.classList.remove('hidden');
      noteEl.innerHTML = '⚠️ ' + msg;
    }

    // ── Three.js ─────────────────────────────────────────────────────
    let renderer, scene, camera, reticle, controller;
    let hitTestSource = null, hitTestSourceRequested = false;
    const spinners = [];   // objetos colocados que giran un poco
    const PALETTE = [0x2f81ff, 0x54b9ff, 0xff7e36, 0xffd23f, 0x33d9a6, 0xff5d8f, 0x9b7bff];

    function initThree() {
      scene = new THREE.Scene();
      camera = new THREE.PerspectiveCamera(70, innerWidth / innerHeight, 0.01, 40);

      scene.add(new THREE.HemisphereLight(0xffffff, 0x335577, 1.1));
      const dir = new THREE.DirectionalLight(0xffffff, 1.4);
      dir.position.set(1, 3, 1);
      scene.add(dir);

      renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setPixelRatio(devicePixelRatio);
      renderer.setSize(innerWidth, innerHeight);
      renderer.xr.enabled = true;
      document.body.appendChild(renderer.domElement);

      // Círculo guía sobre el piso
      reticle = new THREE.Mesh(
        new THREE.RingGeometry(0.07, 0.09, 32).rotateX(-Math.PI / 2),
        new THREE.MeshBasicMaterial({ color: 0x2f81ff })
      );
      reticle.matrixAutoUpdate = false;
      reticle.visible = false;
      scene.add(reticle);

      controller = renderer.xr.getController(0);
      controller.addEventListener('select', onSelect);
      scene.add(controller);

      addEventListener('resize', () => {
        camera.aspect = innerWidth / innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(innerWidth, innerHeight);
      });
    }

    // Crea una figura decorativa aleatoria
    function makeDecoration() {
      const geoms = [
        () => new THREE.IcosahedronGeometry(0.08, 0),
        () => new THREE.TorusKnotGeometry(0.05, 0.02, 64, 8),
        () => new THREE.ConeGeometry(0.07, 0.16, 6),
        () => new THREE.BoxGeometry(0.11, 0.11, 0.11),
        () => new THREE.DodecahedronGeometry(0.08, 0),
        () => new THREE.SphereGeometry(0.075, 24, 16),
      ];
      const color = PALETTE[(Math.random() * PALETTE.length) | 0];
      const mat = new THREE.MeshStandardMaterial({
        color, roughness: 0.35, metalness: 0.25,
        emissive: color, emissiveIntensity: 0.18,
      });
      const mesh = new THREE.Mesh(geoms[(Math.random() * geoms.length) | 0](), mat);
      mesh.rotation.y = Math.random() * Math.PI * 2;
      return mesh;
    }

    function onSelect() {
      if (!reticle.visible) return;
      const obj = makeDecoration();
      obj.position.setFromMatrixPosition(reticle.matrix);
      obj.position.y += 0.08;            // que se apoye sobre el piso
      obj.userData.spin = (Math.random() - 0.5) * 1.2;
      scene.add(obj);
      spinners.push(obj);
      counterEl.textContent = 'Figuras: ' + spinners.length;
      arHint.textContent = '¡Toca otra vez para decorar más! 🎉';
    }

    function clearAll() {
      for (const o of spinners) { scene.remove(o); o.geometry.dispose(); o.material.dispose(); }
      spinners.length = 0;
      counterEl.textContent = 'Figuras: 0';
    }

    function onFrame(timestamp, frame) {
      if (frame) {
        const refSpace = renderer.xr.getReferenceSpace();
        const session = renderer.xr.getSession();
        if (!hitTestSourceRequested) {
          session.requestReferenceSpace('viewer').then((vs) => {
            session.requestHitTestSource({ space: vs }).then((s) => { hitTestSource = s; });
          });
          session.addEventListener('end', () => { hitTestSourceRequested = false; hitTestSource = null; });
          hitTestSourceRequested = true;
        }
        if (hitTestSource) {
          const hits = frame.getHitTestResults(hitTestSource);
          if (hits.length) {
            const pose = hits[0].getPose(refSpace);
            reticle.visible = true;
            reticle.matrix.fromArray(pose.transform.matrix);
            if (!spinners.length) arHint.textContent = 'Piso detectado ✓ — toca la pantalla';
          } else {
            reticle.visible = false;
          }
        }
      }
      const dt = 0.016;
      for (const o of spinners) o.rotation.y += o.userData.spin * dt;
      renderer.render(scene, camera);
    }

    // ── Iniciar / terminar la sesión AR ──────────────────────────────
    async function startAR() {
      if (!renderer) initThree();
      try {
        const session = await navigator.xr.requestSession('immersive-ar', {
          requiredFeatures: ['hit-test'],
          optionalFeatures: ['dom-overlay'],
          domOverlay: { root: overlay },
        });
        overlay.classList.remove('hidden');
        introEl.classList.add('hidden');
        renderer.xr.setReferenceSpaceType('local');
        await renderer.xr.setSession(session);
        renderer.setAnimationLoop(onFrame);

        session.addEventListener('end', () => {
          renderer.setAnimationLoop(null);
          overlay.classList.add('hidden');
          introEl.classList.remove('hidden');
          clearAll();
          hitTestSourceRequested = false; hitTestSource = null;
          arHint.textContent = 'Mueve el teléfono para escanear el piso…';
        });
      } catch (e) {
        console.error(e);
        fail('No se pudo iniciar la sesión AR: ' + (e?.message || e));
      }
    }

    startBtn.addEventListener('click', startAR);
    clearBtn.addEventListener('click', clearAll);
    checkSupport();
  </script>
</body>
</html>
